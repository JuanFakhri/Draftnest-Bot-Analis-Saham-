name: Refresh Sinyal BSJP (harian)

# Perbarui harga + sinyal BSJP (RSI/momentum/gap) tiap hari bursa menjelang tutup,
# tanpa menarik ulang laporan keuangan (ringan). Commit ke main -> situs auto-deploy.
# Jalan 15:20 WIB (08:20 UTC), Sen-Jum — ~40 menit sebelum bursa tutup, pas untuk
# "beli sore". Catatan: pada jam ini candle harian belum final, jadi sinyal = snapshot.

on:
  schedule:
    - cron: "20 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data          # berbagi grup dgn update-data.yml agar tak bentrok
  cancel-in-progress: false

jobs:
  sinyal:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # Selalu operasikan pada `main` (situs deploy dari main) — apa pun ref pemicu.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependensi data
        run: pip install -r requirements-data.txt
      - name: Refresh sinyal BSJP
        run: python -m draftnest.pipeline --signals-only --delay 0.3
      - name: Commit perubahan ke main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/data)" ]; then
            git add docs/data
            git commit -m "data: refresh sinyal BSJP harian (otomatis)"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main || true
              if git push origin HEAD:main; then
                echo "Push berhasil percobaan $i."; break
              fi
              echo "Push ditolak, coba lagi ($i)…"; sleep 5
            done
          else
            echo "Tidak ada perubahan sinyal."
          fi
