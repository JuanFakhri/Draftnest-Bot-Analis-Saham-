name: Perbarui Data Emiten

# Ambil data emiten (profil + 5 tahun laporan + harga) via yfinance dan
# commit ke docs/data/ agar website bisa auto-isi instan.
# - Terjadwal: setiap hari 22:00 UTC (~05:00 WIB)
# - Manual: workflow_dispatch, opsional isi daftar kode (spasi-pisah)

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      tickers:
        description: "Kode emiten (spasi-pisah). Kosong = pakai data/watchlist.txt"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependensi data
        run: pip install -r requirements-data.txt
      - name: Ambil data emiten
        run: python -m draftnest.pipeline ${{ github.event.inputs.tickers }}
      - name: Commit perubahan data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/data)" ]; then
            git add docs/data
            git commit -m "data: perbarui data emiten (otomatis)"
            git push
          else
            echo "Tidak ada perubahan data."
          fi
