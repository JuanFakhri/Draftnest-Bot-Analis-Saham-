name: Perbarui Data Emiten

# Ambil data emiten (profil + laporan + harga) via yfinance TANPA API key,
# dan commit ke docs/data/ agar website bisa auto-isi instan.
# - Terjadwal: setiap hari 22:00 UTC (~05:00 WIB) -> seluruh IDX (--all --resume)
# - Manual: workflow_dispatch dengan pilihan mode.

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode pengambilan"
        type: choice
        options: ["all-resume", "all-refresh", "watchlist", "tickers", "list-only", "screener-only"]
        default: "all-resume"
      tickers:
        description: "Kode emiten (spasi-pisah) — hanya untuk mode 'tickers'"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependensi data
        run: pip install -r requirements-data.txt
      - name: Ambil data emiten
        run: |
          MODE="${{ github.event.inputs.mode }}"
          case "$MODE" in
            all-refresh)   python -m draftnest.pipeline --all --delay 0.5 ;;
            watchlist)     python -m draftnest.pipeline ;;
            tickers)       python -m draftnest.pipeline ${{ github.event.inputs.tickers }} ;;
            list-only)     python -m draftnest.pipeline --all --list-only ;;
            screener-only) python -m draftnest.pipeline --screener-only ;;
            *)             python -m draftnest.pipeline --all --resume --delay 0.5 ;;
          esac
      - name: Commit perubahan data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain docs/data data/idx_tickers.txt)" ]; then
            git add docs/data data/idx_tickers.txt
            git commit -m "data: perbarui data emiten (otomatis)"
            # Rebase dulu supaya push tak ditolak bila main berpindah selama
            # run (mis. ada PR ter-merge di tengah proses fetch ~30 menit).
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                echo "Push berhasil pada percobaan $i."; break
              fi
              echo "Push ditolak, coba lagi ($i)…"; sleep 5
            done
          else
            echo "Tidak ada perubahan data."
          fi
